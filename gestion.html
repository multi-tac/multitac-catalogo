<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MULTI-TAC | Pedidos</title>
<style>
  :root{
    --bg: #0d0d0c;
    --bg-elev: #161614;
    --bg-elev-2: #1e1e1b;
    --border: #2c2c28;
    --gold: #D9A62E;
    --gold-dim: #8a6c22;
    --text: #f2f0ea;
    --text-secondary: #a8a59c;
    --text-muted: #706d64;
    --blue: #4a90d9; --blue-bg: #182636;
    --teal: #2fbf8f; --teal-bg: #11241d;
    --amber: #e8a93b; --amber-bg: #2a2013;
    --green: #7cc142; --green-bg: #1c260f;
    --red: #e15c5c; --red-bg: #2a1414;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{ max-width:480px; margin:0 auto; min-height:100vh; position:relative; }

  header{
    position:sticky; top:0; z-index:20; background:var(--bg);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-icon{
    width:36px; height:36px; border-radius:8px; background:var(--gold);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .brand-icon svg{ width:20px; height:20px; }
  .brand-title{ font-size:16px; font-weight:700; letter-spacing:0.5px; margin:0; }
  .brand-title span{ color:var(--gold); }
  .brand-sub{ font-size:11px; color:var(--text-secondary); margin:0; }
  .icon-btn{
    background:none; border:none; color:var(--text); cursor:pointer;
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    border-radius:8px;
  }
  .icon-btn:active{ background:var(--bg-elev); }

  main{ padding:16px; }

  .stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .stat-card{
    background:var(--bg-elev); border-radius:10px; padding:10px;
    border-left:3px solid var(--gold);
  }
  .stat-card .label{ font-size:11px; color:var(--text-secondary); margin:0 0 4px; }
  .stat-card .value{ font-size:15px; font-weight:700; margin:0; }

  .chip-row{ display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:8px; scrollbar-width:none; }
  .chip-row::-webkit-scrollbar{ display:none; }
  .chip{
    flex:0 0 auto; font-size:12px; font-weight:600; padding:7px 13px;
    border-radius:999px; border:1px solid transparent; cursor:pointer;
    white-space:nowrap; display:flex; align-items:center; gap:5px;
    background:var(--bg-elev); color:var(--text-secondary);
  }
  .chip svg{ width:13px; height:13px; }
  .chip.active-all{ background:var(--gold); color:#1a1509; border-color:var(--gold); }
  .chip[data-state="REALIZADO"]{ background:var(--blue-bg); color:var(--blue); }
  .chip[data-state="PAGADO"]{ background:var(--teal-bg); color:var(--teal); }
  .chip[data-state="ENVIADO"]{ background:var(--amber-bg); color:var(--amber); }
  .chip[data-state="ENTREGADO"]{ background:var(--green-bg); color:var(--green); }
  .chip[data-state="CANCELADO"]{ background:var(--red-bg); color:var(--red); }
  .chip.selected{ box-shadow: inset 0 0 0 1.5px currentColor; }

  .date-row{ display:flex; gap:6px; margin-bottom:16px; }
  .datechip{
    flex:1; font-size:12px; font-weight:600; padding:8px 4px; text-align:center;
    border-radius:8px; border:1px solid var(--border); cursor:pointer;
    background:var(--bg-elev); color:var(--text-secondary);
  }
  .datechip.active{ background:var(--gold); color:#1a1509; border-color:var(--gold); }

  .order-card{
    background:var(--bg-elev); border:1px solid var(--border); border-radius:12px;
    padding:13px; margin-bottom:10px;
  }
  .order-head{ cursor:pointer; }
  .order-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .order-name{ font-size:14px; font-weight:700; margin:0; }
  .order-meta{ font-size:11px; color:var(--text-muted); margin:3px 0 0; }
  .order-total{ font-size:15px; font-weight:700; margin:0; white-space:nowrap; }
  .order-bottom{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:10px; }
  .badge{
    font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px;
    display:flex; align-items:center; gap:4px;
  }
  .badge svg{ width:12px; height:12px; }
  .badge.REALIZADO{ background:var(--blue-bg); color:var(--blue); }
  .badge.PAGADO{ background:var(--teal-bg); color:var(--teal); }
  .badge.ENVIADO{ background:var(--amber-bg); color:var(--amber); }
  .badge.ENTREGADO{ background:var(--green-bg); color:var(--green); }
  .badge.CANCELADO{ background:var(--red-bg); color:var(--red); }

  .order-actions{ display:flex; align-items:center; gap:6px; }
  select{
    font-size:12px; padding:6px 6px; border-radius:6px; background:var(--bg-elev-2);
    color:var(--text); border:1px solid var(--border);
  }
  .wa-btn{
    width:30px; height:30px; border-radius:50%; background:#25D366; display:flex;
    align-items:center; justify-content:center; flex-shrink:0; text-decoration:none;
  }
  .wa-btn svg{ width:16px; height:16px; fill:#0d0d0c; }
  .chevron{ color:var(--text-muted); transition:transform 0.15s; flex-shrink:0; }
  .chevron svg{ width:16px; height:16px; }

  .order-detail{ border-top:1px solid var(--border); margin-top:10px; padding-top:10px; }
  .order-detail table{ width:100%; border-collapse:collapse; }
  .order-detail td{ padding:4px 0; font-size:12px; }
  .order-detail .qty{ text-align:center; color:var(--text-secondary); }
  .order-detail .sub{ text-align:right; }
  .detail-total{
    display:flex; justify-content:space-between; border-top:1px solid var(--border);
    margin-top:6px; padding-top:6px; font-size:12px; font-weight:700;
  }
  .detail-note{ font-size:12px; color:var(--text-secondary); margin:8px 0 0; display:flex; gap:5px; }
  .detail-note svg{ width:14px; height:14px; flex-shrink:0; margin-top:1px; }

  .empty{ text-align:center; color:var(--text-muted); font-size:13px; padding:30px 0; }

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:30;
    opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .drawer{
    position:fixed; top:0; right:0; height:100%; width:88%; max-width:380px;
    background:var(--bg); border-left:1px solid var(--border); z-index:31;
    transform:translateX(100%); transition:transform 0.25s ease; overflow-y:auto;
    padding:16px;
  }
  .drawer.open{ transform:translateX(0); }
  .drawer-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .drawer-title{ font-size:16px; font-weight:700; margin:0; }
  .section-title{ display:flex; align-items:center; gap:6px; margin:20px 0 10px; }
  .section-title svg{ width:16px; height:16px; color:var(--gold); }
  .section-title span{ font-size:13px; font-weight:700; }
  .chart-wrap{ position:relative; width:100%; height:170px; }
  .rank-row{
    display:flex; align-items:center; gap:10px; background:var(--bg-elev);
    border-radius:8px; padding:9px 11px; margin-bottom:6px;
  }
  .rank-num{
    width:22px; height:22px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:11px; font-weight:700; color:#0d0d0c; flex-shrink:0;
  }
  .rank-info{ flex:1; min-width:0; }
  .rank-info p{ margin:0; }
  .rank-name{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rank-sub{ font-size:11px; color:var(--text-secondary); }
  .rank-value{ font-size:13px; font-weight:700; white-space:nowrap; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0c" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <p class="brand-title">MULTI<span>-TAC</span></p>
        <p class="brand-sub">Panel de pedidos</p>
      </div>
    </div>
    <button class="icon-btn" id="menu-toggle" aria-label="Abrir menú de estadísticas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
  </header>

  <main>
    <div class="stats-row">
      <div class="stat-card"><p class="label">Hoy</p><p class="value" id="stat-hoy">$0</p></div>
      <div class="stat-card"><p class="label">Semana</p><p class="value" id="stat-semana">$0</p></div>
      <div class="stat-card"><p class="label">Mes</p><p class="value" id="stat-mes">$0</p></div>
    </div>

    <div class="chip-row" id="state-chips">
      <button class="chip active-all selected" data-state="TODOS">Todos</button>
      <button class="chip" data-state="REALIZADO"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Realizado <span id="cnt-REALIZADO"></span></button>
      <button class="chip" data-state="PAGADO"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>Pagado <span id="cnt-PAGADO"></span></button>
      <button class="chip" data-state="ENVIADO"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="7" width="15" height="10"/><path d="M16 10h4l3 3v4h-7z"/><circle cx="5.5" cy="19.5" r="1.5"/><circle cx="18.5" cy="19.5" r="1.5"/></svg>Enviado <span id="cnt-ENVIADO"></span></button>
      <button class="chip" data-state="ENTREGADO"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>Entregado <span id="cnt-ENTREGADO"></span></button>
      <button class="chip" data-state="CANCELADO"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>Cancelado <span id="cnt-CANCELADO"></span></button>
    </div>

    <div class="date-row" id="date-chips">
      <button class="datechip active" data-range="hoy">Hoy</button>
      <button class="datechip" data-range="semana">Semana</button>
      <button class="datechip" data-range="mes">Mes</button>
      <button class="datechip" data-range="todos">Todos</button>
    </div>

    <div id="order-list"></div>
  </main>

  <div class="overlay" id="overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <p class="drawer-title">Estadísticas</p>
      <button class="icon-btn" id="drawer-close" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
      <span>Ventas por día</span>
    </div>
    <div class="chart-wrap"><canvas id="salesChart" role="img" aria-label="Gráfico de barras de ventas totales por día">Ventas por día variables entre el 4 y 5 de julio de 2026.</canvas></div>

    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/><path d="M8 15l-2 6 6-3 6 3-2-6"/></svg>
      <span>Clientes que más compran</span>
    </div>
    <div id="top-clientes"></div>

    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.4 14.5L16 10 4 22"/><path d="M16 10l-4-4L4 14v8h8z"/></svg>
      <span>Productos más vendidos</span>
    </div>
    <div id="top-productos"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ORDERS = [
{id:"1783225491937",fecha:"2026-07-04T21:24:52",nombre:"Aldo Tula",tel:"2622386861",total:10125,estado:"REALIZADO",obs:"",prod:[{n:"NAVAJA BK",c:1,p:10125}]},
{id:"1783227353344",fecha:"2026-07-04T21:55:53",nombre:"Rosa",tel:"1136784217",total:63450,estado:"REALIZADO",obs:"",prod:[{n:"NAVAJA S&W",c:1,p:13500},{n:"CUCHILLO LABRADO",c:1,p:17550},{n:"CUCHILLO CAMOUFLAGE",c:1,p:16200},{n:"CUCHILLO CAMOUFLAGE",c:1,p:16200}]},
{id:"1783227796219",fecha:"2026-07-04T22:03:16",nombre:"Jazmin",tel:"1540815266",total:59400,estado:"REALIZADO",obs:"",prod:[{n:"CUCHILLO RATIO",c:1,p:18900},{n:"NAVAJA RAPTOR",c:1,p:40500}]},
{id:"1783254850189",fecha:"2026-07-05T05:34:10",nombre:"Lucas",tel:"1125209854",total:12150,estado:"REALIZADO",obs:"",prod:[{n:"NAVAJA BK SKULL",c:1,p:12150}]},
{id:"1783262066423",fecha:"2026-07-05T07:34:26",nombre:"Lucas",tel:"1125209854",total:84375,estado:"PAGADO",obs:"",prod:[{n:"NAVAJA BK SKULL",c:1,p:12150},{n:"NAVAJA BK",c:1,p:10125},{n:"CUCHILLO K-BAR",c:1,p:29700},{n:"CUCHILLO MADERA",c:1,p:32400}]},
{id:"1783272749370",fecha:"2026-07-05T10:32:29",nombre:"Aldo Tula",tel:"2622386861",total:32927,estado:"ENVIADO",obs:"",prod:[{n:"NAVAJA S&W",c:1,p:13500},{n:"CUCHILLO LABRADO",c:1,p:17550},{n:"SILBATO FUTBOL METAL",c:1,p:1877}]},
{id:"1783285318032",fecha:"2026-07-05T14:01:58",nombre:"Jazmín Tuka",tel:"2122238685",total:152550,estado:"ENTREGADO",obs:"",prod:[{n:"CUCHILLO PORTLAND",c:1,p:29700},{n:"CINTURÓN CUCHILLO",c:1,p:16200},{n:"CUCHILLO RATIO",c:1,p:32400},{n:"CUCHILLO COLD SRK",c:1,p:29700},{n:"CUCHILLO COLD SRK",c:1,p:29700},{n:"NAVAJA BR",c:1,p:14850}]},
{id:"1783285320912",fecha:"2026-07-05T14:02:01",nombre:"Jazmín Tuka",tel:"2122238685",total:152550,estado:"CANCELADO",obs:"El cliente pidió cancelar",prod:[{n:"CUCHILLO PORTLAND",c:1,p:29700},{n:"CINTURÓN CUCHILLO",c:1,p:16200},{n:"CUCHILLO RATIO",c:1,p:32400},{n:"CUCHILLO COLD SRK",c:1,p:29700},{n:"CUCHILLO COLD SRK",c:1,p:29700},{n:"NAVAJA BR",c:1,p:14850}]}
];

const STATE_ORDER = ["REALIZADO","PAGADO","ENVIADO","ENTREGADO","CANCELADO"];
const STATE_LABEL = {REALIZADO:"Realizado",PAGADO:"Pagado",ENVIADO:"Enviado",ENTREGADO:"Entregado",CANCELADO:"Cancelado"};
let activeState = "TODOS";
let activeRange = "hoy";
let expandedId = null;
const NOW = new Date();

function fmtMoney(n){ return "$" + Math.round(n).toLocaleString("es-AR"); }
function fmtTime(d){ return d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}); }
function fmtDate(d){ return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"}); }

function waLink(tel){
  let digits = tel.replace(/\D/g,"");
  if(!digits.startsWith("54")) digits = "54" + digits;
  if(digits.length === 12) digits = digits.slice(0,2) + "9" + digits.slice(2);
  return "https://wa.me/" + digits;
}

function inRange(d){
  const startToday = new Date(NOW); startToday.setHours(0,0,0,0);
  if(activeRange==="hoy") return d>=startToday;
  if(activeRange==="semana"){ const sw=new Date(startToday); sw.setDate(sw.getDate()-sw.getDay()); return d>=sw; }
  if(activeRange==="mes"){ const sm=new Date(NOW.getFullYear(),NOW.getMonth(),1); return d>=sm; }
  return true;
}

function computeStats(){
  const startToday = new Date(NOW); startToday.setHours(0,0,0,0);
  const sw=new Date(startToday); sw.setDate(sw.getDate()-sw.getDay());
  const sm=new Date(NOW.getFullYear(),NOW.getMonth(),1);
  let hoy=0,semana=0,mes=0;
  ORDERS.forEach(o=>{
    if(o.estado==="CANCELADO") return;
    const d=new Date(o.fecha);
    if(d>=startToday) hoy+=o.total;
    if(d>=sw) semana+=o.total;
    if(d>=sm) mes+=o.total;
  });
  document.getElementById("stat-hoy").textContent = fmtMoney(hoy);
  document.getElementById("stat-semana").textContent = fmtMoney(semana);
  document.getElementById("stat-mes").textContent = fmtMoney(mes);
}

function computeCounts(){
  STATE_ORDER.forEach(s=>{
    document.getElementById("cnt-"+s).textContent = "("+ORDERS.filter(o=>o.estado===s).length+")";
  });
}

let chartInstance = null;
function renderChart(){
  const byDay = {};
  ORDERS.forEach(o=>{
    if(o.estado==="CANCELADO") return;
    const key = fmtDate(new Date(o.fecha));
    byDay[key] = (byDay[key]||0) + o.total;
  });
  const labels = Object.keys(byDay);
  const data = Object.values(byDay).map(v=>Math.round(v));
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById("salesChart"), {
    type:"bar",
    data:{ labels, datasets:[{ data, backgroundColor:"#D9A62E", borderRadius:4, maxBarThickness:32 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:(ctx)=>fmtMoney(ctx.parsed.y) } } },
      scales:{
        y:{ ticks:{ callback:(v)=>fmtMoney(v), color:"#a8a59c" }, grid:{ color:"#2c2c28" } },
        x:{ ticks:{ color:"#a8a59c" }, grid:{ display:false } }
      } }
  });
}

function renderDetail(o){
  const wrap = document.createElement("div");
  wrap.className = "order-detail";
  let rows = "";
  o.prod.forEach(p=>{
    rows += `<tr><td>${p.n}</td><td class="qty">x${p.c}</td><td class="sub">${fmtMoney(p.c*p.p)}</td></tr>`;
  });
  const sum = o.prod.reduce((a,p)=>a+p.c*p.p,0);
  wrap.innerHTML = `<table>${rows}</table>
    <div class="detail-total"><span>Total</span><span>${fmtMoney(sum)}</span></div>
    ${o.obs?`<p class="detail-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v12H8l-4 4z"/></svg>${o.obs}</p>`:""}`;
  return wrap;
}

function renderList(){
  const list = document.getElementById("order-list");
  let filtered = ORDERS.filter(o=>{
    if(activeState!=="TODOS" && o.estado!==activeState) return false;
    return inRange(new Date(o.fecha));
  });
  filtered.sort((a,b)=> new Date(b.fecha)-new Date(a.fecha));
  list.innerHTML = "";
  if(filtered.length===0){
    list.innerHTML = '<p class="empty">No hay pedidos para este filtro.</p>';
    return;
  }
  filtered.forEach(o=>{
    const d = new Date(o.fecha);
    const card = document.createElement("div");
    card.className = "order-card";
    card.innerHTML = `
      <div class="order-head">
        <div class="order-top">
          <div>
            <p class="order-name">${o.nombre}</p>
            <p class="order-meta">${fmtDate(d)} · ${fmtTime(d)} · ...${o.tel.slice(-4)}</p>
          </div>
          <p class="order-total">${fmtMoney(o.total)}</p>
        </div>
        <div class="order-bottom">
          <span class="badge ${o.estado}">${STATE_LABEL[o.estado]}</span>
          <div class="order-actions">
            <a class="wa-btn" href="${waLink(o.tel)}" target="_blank" rel="noopener" aria-label="Responder por WhatsApp" onclick="event.stopPropagation()">
              <svg viewBox="0 0 32 32"><path d="M16.04 3C9.37 3 3.98 8.39 3.98 15.06c0 2.28.62 4.42 1.7 6.26L3 29l7.9-2.6a12.02 12.02 0 0 0 5.14 1.16h.01c6.67 0 12.06-5.39 12.06-12.06C28.11 8.39 22.72 3 16.04 3zm0 21.86h-.01a9.9 9.9 0 0 1-5.05-1.38l-.36-.21-3.77 1.25 1.26-3.67-.24-.38a9.86 9.86 0 0 1-1.53-5.4c0-5.47 4.45-9.93 9.93-9.93 2.65 0 5.14 1.04 7.01 2.91a9.86 9.86 0 0 1 2.9 7.02c0 5.47-4.46 9.93-9.94 9.93zm5.44-7.44c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.16-.17.2-.35.22-.65.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.65-2.05-.17-.3-.02-.46.13-.6.14-.14.3-.35.45-.53.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37s-1.04 1.02-1.04 2.48 1.06 2.87 1.21 3.07c.15.2 2.09 3.2 5.08 4.48.71.31 1.26.49 1.69.63.71.23 1.36.19 1.87.12.57-.09 1.76-.72 2.01-1.41.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35z"/></svg>
            </a>
            <select onclick="event.stopPropagation()" data-id="${o.id}">
              ${STATE_ORDER.map(s=>`<option value="${s}" ${s===o.estado?"selected":""}>${STATE_LABEL[s]}</option>`).join("")}
            </select>
            <span class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
          </div>
        </div>
      </div>`;
    if(expandedId===o.id){
      card.appendChild(renderDetail(o));
      card.querySelector(".chevron").style.transform = "rotate(180deg)";
    }
    card.querySelector(".order-head").addEventListener("click", (e)=>{
      if(e.target.closest("select") || e.target.closest(".wa-btn")) return;
      expandedId = expandedId===o.id ? null : o.id;
      renderList();
    });
    card.querySelector("select").addEventListener("change", (e)=>{
      const order = ORDERS.find(x=>x.id===e.target.getAttribute("data-id"));
      order.estado = e.target.value;
      computeCounts(); computeStats(); renderChart(); renderTopClientes(); renderTopProductos(); renderList();
    });
    list.appendChild(card);
  });
}

function renderTopClientes(){
  const map = {};
  ORDERS.forEach(o=>{ if(o.estado==="CANCELADO") return; if(!map[o.nombre]) map[o.nombre]={total:0,count:0}; map[o.nombre].total+=o.total; map[o.nombre].count++; });
  const top = Object.entries(map).sort((a,b)=>b[1].total-a[1].total).slice(0,5);
  const el = document.getElementById("top-clientes");
  el.innerHTML = "";
  const medals = ["#D9A62E","#a8a59c","#8a6c22","#565349","#565349"];
  top.forEach((entry,i)=>{
    const [nombre,d] = entry;
    const row = document.createElement("div");
    row.className = "rank-row";
    row.innerHTML = `<div class="rank-num" style="background:${medals[i]}">${i+1}</div>
      <div class="rank-info"><p class="rank-name">${nombre}</p><p class="rank-sub">${d.count} pedidos</p></div>
      <p class="rank-value">${fmtMoney(d.total)}</p>`;
    el.appendChild(row);
  });
}

function renderTopProductos(){
  const map = {};
  ORDERS.forEach(o=>{ if(o.estado==="CANCELADO") return; o.prod.forEach(p=>{ if(!map[p.n]) map[p.n]={cant:0,total:0}; map[p.n].cant+=p.c; map[p.n].total+=p.c*p.p; }); });
  const top = Object.entries(map).sort((a,b)=>b[1].cant-a[1].cant).slice(0,5);
  const el = document.getElementById("top-productos");
  el.innerHTML = "";
  const medals = ["#D9A62E","#a8a59c","#8a6c22","#565349","#565349"];
  top.forEach((entry,i)=>{
    const [nombre,d] = entry;
    const row = document.createElement("div");
    row.className = "rank-row";
    row.innerHTML = `<div class="rank-num" style="background:${medals[i]}">${i+1}</div>
      <div class="rank-info"><p class="rank-name">${nombre}</p><p class="rank-sub">${d.cant} unidades</p></div>
      <p class="rank-value">${fmtMoney(d.total)}</p>`;
    el.appendChild(row);
  });
}

document.querySelectorAll("#state-chips .chip").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    activeState = btn.getAttribute("data-state");
    document.querySelectorAll("#state-chips .chip").forEach(b=>{
      b.classList.remove("selected");
      if(b.getAttribute("data-state")==="TODOS") b.classList.remove("active-all");
    });
    btn.classList.add("selected");
    if(activeState==="TODOS") btn.classList.add("active-all");
    renderList();
  });
});

document.querySelectorAll("#date-chips .datechip").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    activeRange = btn.getAttribute("data-range");
    document.querySelectorAll("#date-chips .datechip").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderList();
  });
});

const drawer = document.getElementById("drawer");
const overlay = document.getElementById("overlay");
document.getElementById("menu-toggle").addEventListener("click", ()=>{
  drawer.classList.add("open"); overlay.classList.add("open");
});
document.getElementById("drawer-close").addEventListener("click", ()=>{
  drawer.classList.remove("open"); overlay.classList.remove("open");
});
overlay.addEventListener("click", ()=>{
  drawer.classList.remove("open"); overlay.classList.remove("open");
});

computeStats(); computeCounts(); renderChart(); renderList(); renderTopClientes(); renderTopProductos();
</script>
</body>
</html>
