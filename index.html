<script>
/* ============================================================================
   CONFIGURACIÓN — REEMPLAZAR ANTES DE PUBLICAR
============================================================================ */

// ID de tu Google Sheet (se obtiene de la URL: /d/ESTE_ID/edit)
const SHEET_ID = "1_odj6wFfsVmf7cADgHY5mHeGxvrxCA80ELHOlSDC_58";

// Nombre exacto de la pestaña/hoja donde están los datos
const SHEET_NAME = "PRODUCTOS_UNIFICADOS";

// Número de WhatsApp de atención (formato internacional, sin + ni espacios. Ej: 5491122334455)
const WHATSAPP_NUMERO = "5491150432518";
const PEDIDOS_API_URL = "https://script.google.com/macros/s/AKfycbwu8TneQNvyiucyyIkDrOUPjv0iGB-bI5b2hzD2dJTOm1WNgg-pIpi7OXp5rBR4xUOeGQ/exec";

/* ============================================================================
   ESTADO GLOBAL
============================================================================ */
let allProducts = [];       // Productos crudos leídos del Sheet
let activeCategory = "TODO";
let activeSubcategory = null;
let searchTerm = "";
let cart = [];               // { id, sku, name, price, image, category, note, qty }
let currentPage = 1;
const PRODUCTS_PER_PAGE = 24; // Igual que Pasteur86: 24 productos por página

// Orden fijo en el que se listan las categorías dentro del panel colapsable
const CATEGORY_ORDER = [
  "CUCHILLERIA",
  "CAMPING",
  "INDUMENTARIA",
  "ACCESORIOS",
  "LINTERNA",
  "HERRAMIENTA",
  "ELECTRICOS",
  "BAZAR"
];

// Categorías actualmente desplegadas dentro del panel (permite más de una abierta a la vez)
let expandedCategories = new Set();
let filterPanelOpen = false;

// Quita tildes y pasa a mayúsculas para poder comparar categorías/subcategorías sin que
// importe cómo estén tildadas en el Sheet.
function normalizeStr(str) {
  return String(str)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .toUpperCase();
}

/* ============================================================================
   DATOS DE RESPALDO (solo para previsualizar el diseño si falla la conexión
   con el Google Sheet — reemplazar/eliminar en producción)
============================================================================ */
const FALLBACK_PRODUCTS = [
  { sku: "CUC-101", name: "Cuchillo Táctico Ka-Bar Full Tang", category: "CUCHILLERIA", subcategory: "CUCHILLOS", price: 45000, image: "https://placehold.co/400x400/191d20/ffb000?text=CUC-101", inStock: true },
  { sku: "CUC-140", name: "Navaja BK Skull", category: "CUCHILLERIA", subcategory: "NAVAJAS", price: 22000, image: "https://placehold.co/400x400/191d20/ffb000?text=CUC-140", inStock: true },
  { sku: "CAM-204", name: "Carpa Iglú 2 Personas 4 Estaciones", category: "CAMPING", subcategory: "CARPAS", price: 89000, image: "https://placehold.co/400x400/191d20/ffb000?text=CAM-204", inStock: true },
  { sku: "IND-330", name: "Campera Softshell Ripstop", category: "INDUMENTARIA", subcategory: "ROPA", price: 62000, image: "https://placehold.co/400x400/191d20/ffb000?text=IND-330", inStock: false },
  { sku: "ACC-410", name: "Chaleco Porta Cargadores Modular", category: "ACCESORIOS", subcategory: "DEFENSA", price: 38000, image: "https://placehold.co/400x400/191d20/ffb000?text=ACC-410", inStock: true },
  { sku: "CUC-105", name: "Multiherramienta Acero Inoxidable", category: "CUCHILLERIA", subcategory: "CUCHILLOS", price: 27000, image: "https://placehold.co/400x400/191d20/ffb000?text=CUC-105", inStock: true },
  { sku: "CAM-210", name: "Bolsa de Dormir Momia -5°C", category: "CAMPING", subcategory: "CARPAS", price: 54000, image: "https://placehold.co/400x400/191d20/ffb000?text=CAM-210", inStock: true }
];

/* ============================================================================
   TRACKING / ESTADISTICAS — visitas, tiempo en sitio, geolocalizacion,
   productos vistos y carrito. Reutiliza el mismo Apps Script de PEDIDOS_API_URL.
============================================================================ */
const STATS_API_URL = PEDIDOS_API_URL;

function getSessionId() {
  let sid = sessionStorage.getItem("mt_sid");
  if (!sid) {
    sid = 'sid_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
    sessionStorage.setItem("mt_sid", sid);
  }
  return sid;
}

const trackQueue = [];
let trackProcessing = false;

async function procesarTrackQueue() {

  if (trackProcessing) return;

  trackProcessing = true;

  while (trackQueue.length > 0) {

    const url = trackQueue.shift();

    try {

      await fetch(url, {
        method: "GET",
        mode: "no-cors"
      });

    } catch (err) {

      console.warn("Error tracking:", err);

    }

    await new Promise(resolve =>
      setTimeout(resolve, 500)
    );
  }

  trackProcessing = false;
}

function trackEvent(params) {

  try {

    const query = new URLSearchParams({
      accion: "track",
      sid: getSessionId(),
      ...params
    }).toString();

    trackQueue.push(
      `${STATS_API_URL}?${query}`
    );

    procesarTrackQueue();

  } catch (err) {

    console.warn(
      "No se pudo registrar evento:",
      err
    );

  }
}

let sessionStartTime = Date.now();

async function initTracking() {
  let geo = { pais: "", prov: "", ciudad: "" };

  try {
    const res = await fetch("https://ipwho.is/");
    const data = await res.json();
    if (data && data.success !== false) {
      geo = {
        pais: data.country || "",
        prov: data.region || "",
        ciudad: data.city || ""
      };
    }
  } catch (err) {
    console.warn("No se pudo geolocalizar la visita:", err);
  }

  const dispositivo = /Mobi|Android/i.test(navigator.userAgent) ? "MOBILE" : "DESKTOP";

  trackEvent({
    evt: "visita",
    pais: geo.pais,
    prov: geo.prov,
    ciudad: geo.ciudad,
    ref: document.referrer || "directo",
    dev: dispositivo
  });

  // Heartbeat de duracion cada 20s mientras la pagina sigue abierta
  setInterval(() => {
    const seg = Math.round((Date.now() - sessionStartTime) / 1000);
    trackEvent({ evt: "duracion", seg });
  }, 20000);

  // Ultimo heartbeat al salir de la pagina (mejor esfuerzo, no siempre dispara en mobile)
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
      const seg = Math.round((Date.now() - sessionStartTime) / 1000);
      trackEvent({ evt: "duracion", seg });
    }
  });
}

// Registra cada SKU visto una sola vez por sesion
const vistosEnSesion = new Set();
function trackProductoVisto(sku, nombre) {
  if (!sku || vistosEnSesion.has(sku)) return;
  vistosEnSesion.add(sku);
  trackEvent({ evt: "producto_visto", sku, prod: nombre });
}

// Observa las tarjetas de producto renderizadas y dispara trackProductoVisto
// cuando realmente entran en el viewport (no solo por estar en el DOM)
let viewObserver = null;
function setupViewObserver() {
  if (viewObserver) viewObserver.disconnect();
  viewObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {

  const sku = entry.target.getAttribute("data-sku");
  const nombre = entry.target.getAttribute("data-name");

  trackProductoVisto(
    sku,
    nombre
  );

  viewObserver.unobserve(
    entry.target
  );

}
    });
  }, { threshold: 0.5 });

  document.querySelectorAll("[data-sku]").forEach(el => viewObserver.observe(el));
}

/* ============================================================================
   CARGA DE DATOS DESDE GOOGLE SHEETS (API pública de visualización GViz)
============================================================================ */
async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("No se pudo leer el Google Sheet");
  const text = await res.text();

  // La respuesta viene envuelta en "google.visualization.Query.setResponse(...)"
  const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
  const data = JSON.parse(jsonStr);

  const rows = data.table.rows || [];

  // Columnas del Sheet: A SKU | B Producto | C Categoría | D Subcategoría
  // | E PrecioProveedor | F %Ganancia | G PrecioReventa (la que se muestra en la web)
  // | H Imagen | I Disponible (SI/NO — si está vacío se toma como disponible)
  const products = rows
    .map(row => {
      const c = row.c;
      const disponibleRaw = (c[8] && c[8].v) ? String(c[8].v).trim().toUpperCase() : "SI";
      return {
        sku: (c[0] && c[0].v) ? String(c[0].v).trim() : "",
        name: (c[1] && c[1].v) ? String(c[1].v).trim() : "",
        category: (c[2] && c[2].v) ? String(c[2].v).trim().toUpperCase() : "",
        subcategory: (c[3] && c[3].v) ? String(c[3].v).trim().toUpperCase() : "",
        price: (c[6] && c[6].v) ? Number(c[6].v) : 0,
        image: (c[7] && c[7].v) ? String(c[7].v).trim() : "",
        inStock: disponibleRaw !== "NO"
      };
    })
    // Descarta filas vacías o la fila de encabezado si viene incluida
    .filter(p => p.name && p.sku.toUpperCase() !== "SKU");

  if (products.length === 0) throw new Error("Sheet sin productos válidos");
  return products;
}

/* ============================================================================
   INICIALIZACIÓN
============================================================================ */
async function init() {
  setState("loading");
  try {
    allProducts = await fetchSheetData();
  } catch (err) {
    console.warn("Fallo la conexión con Google Sheets, usando datos de respaldo:", err);
    allProducts = FALLBACK_PRODUCTS; // Quitar esta línea en producción si preferís mostrar el error puro
  }
  renderCategoryTree();
  updateFilterLabel();
  applyFilters();
  updateCartUI();
}

function setState(state) {
  document.getElementById('loadingState').classList.toggle('hidden', state !== 'loading');
  document.getElementById('errorState').classList.toggle('hidden', state !== 'error');
  document.getElementById('productGrid').classList.toggle('hidden', state !== 'ready');
}

/* ============================================================================
   PANEL DE FILTROS COLAPSABLE — CATEGORÍAS Y SUBCATEGORÍAS
============================================================================ */

// Arma, a partir de los productos cargados, un mapa { CATEGORIA: Set(SUBCATEGORIAS) }
function buildCategoryTree() {
  const tree = {};
  allProducts.forEach(p => {
    const cat = (p.category || "SIN CATEGORÍA").trim();
    if (!cat) return;
    if (!tree[cat]) tree[cat] = new Set();
    const sub = (p.subcategory || "").trim();
    if (sub) tree[cat].add(sub);
  });
  return tree;
}

function toggleFilterPanel() {
  filterPanelOpen = !filterPanelOpen;
  const panel = document.getElementById('filterPanel');
  const chevron = document.getElementById('filterToggleChevron');
  panel.classList.toggle('open', filterPanelOpen);
  chevron.classList.toggle('rotated', filterPanelOpen);
}

function toggleCategoryExpand(cat) {
  if (expandedCategories.has(cat)) {
    expandedCategories.delete(cat);
  } else {
    expandedCategories.add(cat);
  }
  renderCategoryTree();
}

function renderCategoryTree() {
  const tree = buildCategoryTree();

  // Respeta el orden predefinido y agrega al final cualquier categoría nueva no contemplada
  const knownCats = CATEGORY_ORDER.filter(c => tree[c]);
  const extraCats = Object.keys(tree).filter(c => !CATEGORY_ORDER.includes(c)).sort();
  const orderedCats = [...knownCats, ...extraCats];

  const container = document.getElementById('categoryTree');

  container.innerHTML = orderedCats.map(cat => {
    const subs = Array.from(tree[cat]).sort();
    const isExpanded = expandedCategories.has(cat);
    const isCategoryActive = activeCategory === cat && !activeSubcategory;
    const count = allProducts.filter(p => normalizeStr(p.category) === normalizeStr(cat)).length;

    const subItemsHtml = subs.map(sub => {
      const isSubActive = activeCategory === cat && activeSubcategory === sub;
      const subCount = allProducts.filter(p =>
        normalizeStr(p.category) === normalizeStr(cat) && normalizeStr(p.subcategory) === normalizeStr(sub)
      ).length;
      return `
        <button
          onclick="selectCategory('${escapeAttr(cat)}', '${escapeAttr(sub)}')"
          class="w-full text-left pl-8 pr-3 py-2 text-xs font-mono flex items-center justify-between border-t border-carbon-700/60
          ${isSubActive ? 'text-amber-500' : 'text-ink-400'}"
        >
          <span class="flex items-center gap-2">
            <span class="w-1 h-1 rounded-full ${isSubActive ? 'bg-amber-500' : 'bg-ink-600'}"></span>
            ${escapeHtml(sub)}
          </span>
          <span class="text-[10px] text-ink-600">${subCount}</span>
        </button>
      `;
    }).join('');

    return `
      <div class="border-b border-carbon-700 last:border-b-0">
        <div class="flex items-stretch">
          <button
            onclick="selectCategory('${escapeAttr(cat)}', null)"
            class="flex-1 text-left px-3 py-2.5 font-display text-sm tracking-wide flex items-center gap-2
            ${isCategoryActive ? 'text-amber-500' : 'text-ink-100'}"
          >
            ${isCategoryActive ? '<i class="fa-solid fa-circle text-[6px] text-amber-500"></i>' : ''}
            ${escapeHtml(cat)}
            <span class="text-[10px] font-mono text-ink-600">(${count})</span>
          </button>
          ${subs.length > 0 ? `
            <button
              onclick="toggleCategoryExpand('${escapeAttr(cat)}')"
              class="px-3 flex items-center justify-center text-ink-400"
              aria-label="Desplegar subcategorías"
            >
              <i class="fa-solid fa-chevron-down text-xs cat-chevron ${isExpanded ? 'rotated' : ''}"></i>
            </button>
          ` : ''}
        </div>
        ${subs.length > 0 ? `
          <div class="cat-sublist ${isExpanded ? 'open' : ''}">
            ${subItemsHtml}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function updateFilterLabel() {
  const label = document.getElementById('activeFilterLabel');
  if (activeCategory === "TODO") {
    label.textContent = "TODO EL CATÁLOGO";
  } else if (activeSubcategory) {
    label.textContent = `${activeCategory} › ${activeSubcategory}`;
  } else {
    label.textContent = activeCategory;
  }
}

function selectCategory(cat, sub) {
  activeCategory = cat;
  activeSubcategory = sub;
  currentPage = 1;

  // Si se eligió una categoría con subcategorías, la deja desplegada para mostrar la selección
  if (cat !== "TODO") {
    expandedCategories.add(cat);
  }

  renderCategoryTree();
  updateFilterLabel();
  applyFilters();

  // Cierra el panel para pasar directamente a ver los resultados
  if (filterPanelOpen) toggleFilterPanel();
}

/* ============================================================================
   FILTRO + BÚSQUEDA
============================================================================ */
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
  currentPage = 1;
  applyFilters();
});

function applyFilters() {
  let list = allProducts;

  if (activeCategory !== "TODO") {
    const targetCat = normalizeStr(activeCategory);
    list = list.filter(p => normalizeStr(p.category) === targetCat);

    if (activeSubcategory) {
      const targetSub = normalizeStr(activeSubcategory);
      list = list.filter(p => normalizeStr(p.subcategory) === targetSub);
    }
  }

  if (searchTerm) {
    list = list.filter(p =>
      p.name.toLowerCase().includes(searchTerm) ||
      p.sku.toLowerCase().includes(searchTerm)
    );
  }

  // Recorta la lista a los 24 productos que corresponden a la página actual
  const totalPages = Math.max(1, Math.ceil(list.length / PRODUCTS_PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PRODUCTS_PER_PAGE;
  const pageItems = list.slice(start, start + PRODUCTS_PER_PAGE);

  renderProducts(pageItems);
  renderPagination(list.length);
}

/* ============================================================================
   RENDER — PAGINACIÓN NUMERADA (mismo criterio que Pasteur86: 24 por página)
============================================================================ */
function renderPagination(totalItems) {
  const container = document.getElementById('pagination');
  const totalPages = Math.ceil(totalItems / PRODUCTS_PER_PAGE);

  if (totalPages <= 1) {
    container.classList.add('hidden');
    container.innerHTML = '';
    return;
  }

  container.classList.remove('hidden');

  let html = '';

  html += `
    <button
      onclick="goToPage(${Math.max(1, currentPage - 1)})"
      ${currentPage === 1 ? 'disabled' : ''}
      class="font-mono text-xs px-2.5 py-1.5 rounded-sm border border-carbon-600 ${currentPage === 1 ? 'text-ink-600 cursor-not-allowed' : 'text-ink-100 hover:border-amber-500/50'}"
    >&lsaquo;</button>
  `;

  for (let i = 1; i <= totalPages; i++) {
    const active = i === currentPage;
    html += `
      <button
        onclick="goToPage(${i})"
        class="font-mono text-xs w-8 h-8 rounded-sm border ${
          active
            ? 'bg-amber-500 text-carbon-950 border-amber-500 font-bold'
            : 'bg-carbon-800 text-ink-100 border-carbon-600'
        }"
      >${i}</button>
    `;
  }

  html += `
    <button
      onclick="goToPage(${Math.min(totalPages, currentPage + 1)})"
      ${currentPage === totalPages ? 'disabled' : ''}
      class="font-mono text-xs px-2.5 py-1.5 rounded-sm border border-carbon-600 ${currentPage === totalPages ? 'text-ink-600 cursor-not-allowed' : 'text-ink-100 hover:border-amber-500/50'}"
    >&rsaquo;</button>
  `;

  container.innerHTML = html;
}

function goToPage(page) {
  currentPage = page;
  applyFilters();
  document.getElementById('productGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ============================================================================
   RENDER — GRILLA DE PRODUCTOS
============================================================================ */
function renderProducts(list) {
  const grid = document.getElementById('productGrid');
  const empty = document.getElementById('emptyState');

  if (list.length === 0) {
    setState('ready');
    grid.classList.add('hidden');
    empty.classList.remove('hidden');
    empty.classList.add('flex');
    return;
  }

  setState('ready');
  empty.classList.add('hidden');
  empty.classList.remove('flex');
  grid.classList.remove('hidden');

  grid.innerHTML = list.map((p, idx) => {
    const safeIdx = `p${idx}_${p.sku.replace(/[^a-zA-Z0-9]/g, '')}`;
    const outOfStock = p.inStock === false;
    return `
    <div class="bg-carbon-800 border border-carbon-700 rounded-sm overflow-hidden flex flex-col ${outOfStock ? 'opacity-60' : ''}" data-sku="${escapeAttr(p.sku)}" data-name="${escapeAttr(p.name)}">

      <div class="reticle m-2 mb-0 aspect-square bg-carbon-900 overflow-hidden">
        <span class="c-tr"></span><span class="c-bl"></span>
        <img src="${p.image}" alt="${escapeHtml(p.name)}" class="w-full h-full object-cover ${outOfStock ? 'grayscale' : ''}" loading="lazy"
             onerror="this.src='https://placehold.co/400x400/191d20/4a5257?text=SIN+IMAGEN'">
        ${outOfStock ? `
          <div class="absolute inset-0 flex items-center justify-center bg-carbon-950/50">
            <span class="border border-amber-500 text-amber-500 font-display font-700 text-xs tracking-[0.15em] px-3 py-1 bg-carbon-950/80">AGOTADO</span>
          </div>` : ''
        }
      </div>

      <div class="p-3 flex flex-col gap-1.5 flex-1">
        <span class="font-mono text-[9px] text-amber-500/80 tracking-wider">${escapeHtml(p.category)}${p.subcategory ? ' · ' + escapeHtml(p.subcategory) : ''}</span>
        <span class="font-mono text-[10px] text-ink-600">SKU ${escapeHtml(p.sku)}</span>
        <h3 class="font-display font-600 text-sm leading-tight text-ink-100 min-h-[2.2em]">${escapeHtml(p.name)}</h3>
        <span class="font-mono text-amber-500 font-bold text-base glow-amber mt-1">${formatPrice(p.price)}</span>

        <input
          id="note_${safeIdx}"
          type="text"
          placeholder="Talle, color o aclaración aquí..."
          ${outOfStock ? 'disabled' : ''}
          class="mt-2 w-full bg-carbon-900 border border-carbon-600 rounded-sm px-2 py-2 text-xs text-ink-100 placeholder:text-ink-600 font-body ${outOfStock ? 'cursor-not-allowed' : ''}"
        >

        <button
          ${outOfStock ? 'disabled' : `onclick='addToCart(${JSON.stringify(p)}, "note_${safeIdx}")'`}
          class="mt-2 w-full ${outOfStock
            ? 'bg-carbon-900 border border-carbon-600 text-ink-600 cursor-not-allowed'
            : 'bg-carbon-700 hover:bg-amber-500 hover:text-carbon-950 border border-amber-500/40 text-amber-500'} text-xs font-display font-700 tracking-wide py-2.5 rounded-sm transition-colors flex items-center justify-center gap-1.5"
        >
          ${outOfStock
            ? '<i class="fa-solid fa-ban text-[10px]"></i> SIN STOCK'
            : '<i class="fa-solid fa-plus text-[10px]"></i> AGREGAR'}
        </button>
      </div>
    </div>
    `;
  }).join('');

  setupViewObserver();
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'");
}

function formatPrice(n) {
  return Number(n).toLocaleString('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 });
}

/* ============================================================================
   LÓGICA DE CARRITO
============================================================================ */
function addToCart(product, noteInputId) {
  const noteInput = document.getElementById(noteInputId);
  const note = noteInput ? noteInput.value.trim() : "";

  // El identificador combina SKU + nota (normalizada) para separar variantes distintas
  const itemId = `${product.sku}::${note.toLowerCase()}`;

  const existing = cart.find(i => i.id === itemId);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({
      id: itemId,
      sku: product.sku,
      name: product.name,
      category: product.category,
      price: product.price,
      image: product.image,
      note: note,
      qty: 1
    });
  }

  trackEvent({ evt: "carrito", sku: product.sku, prod: product.name });

  if (noteInput) noteInput.value = "";
  updateCartUI();
  flashAdded(noteInputId);
}

function flashAdded(noteInputId) {
  const btn = document.getElementById(noteInputId)?.nextElementSibling;
  if (!btn) return;
  const original = btn.innerHTML;
  btn.innerHTML = '<i class="fa-solid fa-check text-[10px]"></i> AGREGADO';
  setTimeout(() => { btn.innerHTML = original; }, 900);
}

function changeQty(itemId, delta) {
  const item = cart.find(i => i.id === itemId);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) {
    cart = cart.filter(i => i.id !== itemId);
  }
  updateCartUI();
}

// Permite editar o agregar la nota/observación de un ítem directamente desde el carrito.
// Si la nueva nota coincide con la de otro ítem del mismo SKU, se fusionan las cantidades
// en vez de dejar dos filas separadas con el mismo texto.
function updateCartNote(itemId, newNoteRaw) {
  const item = cart.find(i => i.id === itemId);
  if (!item) return;

  const newNote = newNoteRaw.trim();
  const newId = `${item.sku}::${newNote.toLowerCase()}`;

  if (newId === item.id) {
    item.note = newNote;
    updateCartUI();
    return;
  }

  const duplicate = cart.find(i => i.id === newId && i !== item);
  if (duplicate) {
    duplicate.qty += item.qty;
    cart = cart.filter(i => i !== item);
  } else {
    item.note = newNote;
    item.id = newId;
  }
  updateCartUI();
}

function removeItem(itemId) {
  cart = cart.filter(i => i.id !== itemId);
  updateCartUI();
}

function cartTotal() {
  return cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
}

function cartCount() {
  return cart.reduce((sum, i) => sum + i.qty, 0);
}

/* ============================================================================
   RENDER — UI DEL CARRITO (barra inferior + modal)
============================================================================ */
function updateCartUI() {
  const count = cartCount();
  const total = cartTotal();

  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartSubtotalBar').textContent = formatPrice(total);
  document.getElementById('cartTotal').textContent = formatPrice(total);

  const cartBar = document.getElementById('cartBar');
  cartBar.classList.toggle('hidden', count === 0);

  renderCartItems();
}

function renderCartItems() {
  const list = document.getElementById('cartItemsList');

  if (cart.length === 0) {
    list.innerHTML = `
      <div class="flex flex-col items-center justify-center py-10 text-ink-400">
        <i class="fa-solid fa-box-open text-2xl mb-2 text-ink-600"></i>
        <p class="font-mono text-xs">EL CARRITO ESTÁ VACÍO</p>
      </div>`;
    return;
  }

  list.innerHTML = cart.map(item => `
    <div class="bg-carbon-800 border border-carbon-700 rounded-sm p-3 flex gap-3">
      <img src="${item.image}" class="w-16 h-16 object-cover rounded-sm border border-carbon-600 shrink-0"
           onerror="this.src='https://placehold.co/100x100/191d20/4a5257?text=--'">

      <div class="flex-1 min-w-0">
        <div class="flex justify-between items-start gap-2">
          <div class="min-w-0">
            <p class="font-display font-600 text-sm text-ink-100 truncate">${escapeHtml(item.name)}</p>
            <p class="font-mono text-[10px] text-ink-600">SKU ${escapeHtml(item.sku)}</p>
          </div>
          <button onclick="removeItem('${item.id}')" class="text-ink-600 hover:text-amber-500 shrink-0">
            <i class="fa-solid fa-trash-can text-xs"></i>
          </button>
        </div>

        <div class="mt-1.5 relative">
          <i class="fa-solid fa-note-sticky absolute left-2 top-1/2 -translate-y-1/2 text-amber-500/70 text-[10px]"></i>
          <input
            type="text"
            value="${escapeHtml(item.note)}"
            placeholder="Sin observación — agregar aquí..."
            onchange="updateCartNote('${item.id}', this.value)"
            class="w-full bg-carbon-900 border border-carbon-600 rounded-sm pl-6 pr-2 py-1.5 text-xs text-amber-500 placeholder:text-ink-600 font-body"
          >
        </div>

        <div class="flex items-center justify-between mt-2">
          <div class="flex items-center gap-2 bg-carbon-900 border border-carbon-600 rounded-sm">
            <button onclick="changeQty('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center text-amber-500">
              <i class="fa-solid fa-minus text-[10px]"></i>
            </button>
            <span class="font-mono text-sm w-5 text-center">${item.qty}</span>
            <button onclick="changeQty('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center text-amber-500">
              <i class="fa-solid fa-plus text-[10px]"></i>
            </button>
          </div>
          <span class="font-mono text-amber-500 font-bold text-sm">${formatPrice(item.price * item.qty)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

/* ============================================================================
   APERTURA / CIERRE DEL MODAL
============================================================================ */
function openCart() {
  document.getElementById('cartBackdrop').classList.remove('hidden');
  requestAnimationFrame(() => {
    document.getElementById('cartBackdrop').classList.remove('opacity-0');
    document.getElementById('cartSheet').classList.remove('translate-y-full');
  });
}

function closeCart() {
  document.getElementById('cartBackdrop').classList.add('opacity-0');
  document.getElementById('cartSheet').classList.add('translate-y-full');
  setTimeout(() => document.getElementById('cartBackdrop').classList.add('hidden'), 280);
}

/* ============================================================================
   DESPACHO A WHATSAPP
============================================================================ */
async function guardarPedido(nombre, telefono) {

  const detalle = cart.map(item => ({
    sku: item.sku,
    producto: item.name,
    cantidad: item.qty,
    precio: item.price,
    observacion: item.note || ""
  }));

  const pedido = {
    nombre: nombre,
    telefono: telefono,
    total: cartTotal(),
    observaciones: "",
    detalle: detalle
  };

  try {

    await fetch(PEDIDOS_API_URL, {
      method: "POST",
      mode: "no-cors",
      redirect: "follow",
      body: JSON.stringify(pedido)
    });

  } catch (err) {

    console.error("Error al guardar pedido:", err);

  }
}

async function sendToWhatsApp() {

  const nombre = document.getElementById("customerName").value.trim();
  const telefono = document.getElementById("customerPhone").value.trim();

  if (!nombre) {
    alert("Debe ingresar su nombre.");
    return;
  }

  if (!telefono) {
    alert("Debe ingresar su teléfono.");
    return;
  }

  await guardarPedido(nombre, telefono);

  if (cart.length === 0) return;

  trackEvent({ evt: "pedido_enviado" });

  let msg = `*🛒 NUEVO PEDIDO - MULTI-TAC*\n\n`;
  msg += `*Cliente:* ${nombre}\n`;
  msg += `*Teléfono:* ${telefono}\n\n`;
  msg += `*Listado de artículos:*\n\n`;

  cart.forEach((item, idx) => {

    const subtotal = item.price * item.qty;

    msg += `*${idx + 1}. ${item.name}*\n`;
    msg += `SKU: ${item.sku}\n`;

    if (item.note) {
      msg += `Observación: ${item.note}\n`;
    }

    msg += `Cantidad: ${item.qty} x ${formatPrice(item.price)} = *${formatPrice(subtotal)}*\n\n`;

  });

  msg += `*TOTAL GENERAL: ${formatPrice(cartTotal())}*\n\n`;
  msg += `Quedo a la espera para coordinar *forma de pago* y *envío*. ¡Gracias!`;

  const url = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(msg)}`;

  window.open(url, "_blank");
}

/* ============================================================================
   ARRANQUE
============================================================================ */
document.addEventListener("DOMContentLoaded", async () => {
  initTracking();
  await init();
});

</script>
